name: Desktop Build (robust)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  release:
    types: [created]

env:
  APP_NAME: ImageGenGUI
  ELECTRON_DIR: electron
  WEBUI_DIR: webui
  PY_DIR: python/generator

jobs:
  build-artifacts:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18.x]
        go-version: [1.20]
        python-version: [3.11]
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Try Setup Node (primary)
        id: setupnode
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
        timeout-minutes: 5

      - name: Fallback install Node on Linux
        if: steps.setupnode.outcome != 'success' && matrix.os == 'ubuntu-latest'
        run: |
          echo "Primary setup-node failed; installing Node via tarball fallback"
          NODE_VER=18.20.8
          ARCH=linux-x64
          URL="https://nodejs.org/dist/v${NODE_VER}/node-v${NODE_VER}-${ARCH}.tar.xz"
          curl -fsSL "$URL" -o /tmp/node.tar.xz
          sudo tar -xJf /tmp/node.tar.xz -C /usr/local --strip-components=1
          node -v
        timeout-minutes: 10

      - name: Fallback install Node on macOS
        if: steps.setupnode.outcome != 'success' && matrix.os == 'macos-latest'
        run: |
          echo "Primary setup-node failed; installing Node via brew fallback"
          brew update || true
          brew install node@18 || brew install node
          node -v
        timeout-minutes: 10

      - name: Fallback install Node on Windows
        if: steps.setupnode.outcome != 'success' && matrix.os == 'windows-latest'
        shell: powershell
        run: |
          Write-Host "Primary setup-node failed; installing Node via choco fallback"
          choco install nodejs-lts -y
          node -v
        timeout-minutes: 10

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install Node deps (electron)
        if: matrix.os != ''
        working-directory: electron
        run: |
          npm ci
        timeout-minutes: 10

      - name: Install Go deps
        run: |
          go mod tidy
        timeout-minutes: 5

      - name: Build Go binary (platform specific)
        run: |
          set -e
          OUT=worker
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then OUT=worker.exe; fi
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then GOOS=darwin; GOARCH=amd64; fi
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then GOOS=windows; GOARCH=amd64; fi
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then GOOS=linux; GOARCH=amd64; fi
          mkdir -p electron/resources
          env GOOS=$GOOS GOARCH=$GOARCH go build -o electron/resources/$OUT ./cmd/gui
        shell: bash
        timeout-minutes: 10

      - name: Build Python standalone (PyInstaller)
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          mkdir -p electron/resources/python
          cp ${PY_DIR}/app.py electron/resources/python/app.py
          pyinstaller --onefile --distpath electron/resources/python electron/resources/python/app.py
          ls -la electron/resources/python
        timeout-minutes: 20

      - name: Prepare webui into electron
        run: |
          rm -rf electron/app
          mkdir -p electron/app
          cp -r ${WEBUI_DIR}/* electron/app/
        timeout-minutes: 5

      - name: Build Electron app (dist)
        working-directory: electron
        env:
          CSC_LINK: ${{ secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD || '' }}
        run: |
          npm run dist -- --publish never
        timeout-minutes: 30

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: electron/dist
